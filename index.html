<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="app">

<h1 class="title">Weather AI</h1>

<div class="search">
<input type="text" id="city" placeholder="Enter city">
<button id="searchBtn">Search</button>
</div>

<div class="weather">

<div class="temp" id="temp">--°</div>

<div class="city" id="cityName">City</div>

<div class="desc" id="desc">Condition</div>

<div class="details">

<div class="card">
<span>Humidity</span>
<h3 id="humidity">--%</h3>
</div>

<div class="card">
<span>Wind</span>
<h3 id="wind">-- km/h</h3>
</div>

<div class="card">
<span>Feels</span>
<h3 id="feels">--°</h3>
</div>

</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
